<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>100名店マップ 2025</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="data.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .popup-card { min-width: 180px; padding: 5px; }
        .btn { display: block; text-align: center; padding: 10px; margin-top: 8px; border-radius: 5px; 
               text-decoration: none; font-weight: bold; font-size: 13px; color: white; }
        .btn-tabelog { background: #ff6600; }
        .btn-nav { background: #4285f4; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
// --- 既存のコードの下に追加 ---

map.on('load', () => {
    // 1. 位置情報コントロールの定義（設定を変更）
    const geolocate = new maplibregl.GeolocateControl({
        positionOptions: {
            enableHighAccuracy: true // 高精度な位置情報を取得
        },
        trackUserLocation: true, // 自分の移動に合わせて追従
        showUserLocation: true   // 自分の位置に青い丸を表示
    });

    // 地図にコントロールを追加
    map.addControl(geolocate);

    // 2. 【重要】地図がロードされたら自動的に現在地を取得して移動する
    geolocate.on('geolocate', (e) => {
        // 初回のみズームレベルを調整して移動（お好みの数字に）
        map.flyTo({
            center: [e.coords.longitude, e.coords.latitude],
            zoom: 14,
            essential: true
        });
    });

    // 3. ページを開いてすぐに位置測位を開始する
    // ブラウザの「位置情報の許可」ダイアログが出ます
    setTimeout(() => {
        const btn = document.querySelector('.maplibregl-ctrl-geolocate');
        if (btn) btn.click();
    }, 500); // 0.5秒後に自動クリックを実行

    // --- 以下、既存のaddSourceやaddLayerのコード ---
    map.addSource('shops', { ... });
    // ...
});
</script>
</body>

</html>
